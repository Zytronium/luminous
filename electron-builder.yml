appId: dev.zytronium.luminous
productName: Luminous

directories:
  output: dist
  buildResources: resources

files:
  - build
  - package.json
  - filter:
      - "!**/node_modules/@types/**"
      - "!**/node_modules/typescript/**"
      - "!**/node_modules/eslint/**"
      - "!**/node_modules/@eslint/**"
      - "!**/node_modules/electron/**"
      - "!**/node_modules/electron-builder/**"
      - "!**/node_modules/tsup/**"
      - "!**/node_modules/tailwindcss/**"
      - "!**/node_modules/@tailwindcss/**"
      - "!**/node_modules/ts-node/**"
      - "!**/node_modules/babel-plugin-react-compiler/**"
      - "!**/node_modules/cross-env/**"
      - "!**/node_modules/npm-run-all/**"


extraResources:
  - from: .next/standalone/server.js
    to: app/server.js
  - from: .next/standalone/package.json
    to: app/package.json
  - from: .next/standalone/node_modules
    to: app/node_modules
  - from: .next
    to: app/.next
    filter:
      - "!standalone/**"
  - from: public
    to: app/public

asar: true

win:
  target: nsis
  icon: resources/icon.ico

mac:
  target: dmg
  icon: resources/icon.icns

linux:
  target:
  - AppImage
  - deb
  category: Network

nodeVersion: 24.13.0
