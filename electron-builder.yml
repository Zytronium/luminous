appId: dev.zytronium.luminous
productName: Luminous

directories:
  output: dist
  buildResources: resources

files:
  - build
  - package.json

extraResources:
  - from: .next/standalone/server.js
    to: app/server.js
  - from: .next/standalone/package.json
    to: app/package.json
  - from: .next/standalone/node_modules
    to: app/node_modules
  - from: .next
    to: app/.next
    filter:
      - "!standalone/**"
  - from: public
    to: app/public

asar: true

win:
  target: nsis
  icon: resources/icon.ico

mac:
  target: dmg
  icon: resources/icon.icns

linux:
  target: AppImage
  category: Network
