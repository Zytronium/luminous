appId: dev.zytronium.luminous
productName: Luminous

directories:
  output: dist
  buildResources: resources

files:
  - build
  - package.json
  - "!node_modules/**"

extraResources:
  - from: .next/standalone/server.js
    to: app/server.js
  - from: .next/standalone/package.json
    to: app/package.json
  - from: .next/standalone/node_modules
    to: app/node_modules
    filter:
      - "!**/@img/**"
      - "!**/sharp/**"
      - "!**/@next/swc-linux-x64-musl/**"
      - "!**/@next/swc-linux-x64-gnu/**"
      - "!**/@next/swc-win32*/**"
      - "!**/@next/swc-darwin*/**"
      - "!**/babel-plugin-react-compiler/**"
      - "!**/caniuse-lite/**"
      - "!**/@types/**"
      - "!**/*.map"
      - "!**/*.d.ts"
      - "!**/test/**"
      - "!**/tests/**"
      - "!**/docs/**"
  - from: .next
    to: app/.next
    filter:
      - "!standalone/**"
      - "!cache/**"
      - "!dev/**"
      - "!**/*.map"
  - from: public
    to: app/public

asar: true

win:
  target: nsis
  icon: resources/icon.ico

mac:
  target: dmg
  icon: resources/icon.icns

linux:
  target:
    - AppImage
    - deb
  category: Network