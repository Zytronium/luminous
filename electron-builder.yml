appId: dev.zytronium.luminous
productName: Luminous

directories:
  output: dist
  buildResources: resources

files:
  - build
  - package.json
  - from: node_modules
    to: node_modules
    filter:
      - "!**"
      - "get-port-please/**"
      - "get-port/**"

extraResources:
  - from: .next/standalone/server.js
    to: app/server.js
  - from: .next/standalone/package.json
    to: app/package.json
  - from: .next/standalone/node_modules
    to: app/node_modules
  - from: .next
    to: app/.next
    filter:
      - "!standalone/**"
      - "!cache/**"
      - "!trace"
      - "!*.trace"
  - from: public
    to: app/public

asar: true

win:
  target: nsis
  icon: resources/icon.ico

mac:
  target: dmg
  icon: resources/icon.icns

linux:
  target:
    - AppImage
    - deb
  category: Network

nodeVersion: 24.13.0
